name: Auto-format PR
concurrency:
  group: auto-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  auto_format:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        token: ${{ secrets.AUTO_COMMIT_PAT }}
        fetch-depth: 0
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: --- Attacker-controlled content inspection ---"
        echo "GARALT_DBG: Checking scripts/generate_opcode_metadata.py from PR"
        if [ -f scripts/generate_opcode_metadata.py ]; then
          echo "GARALT_DBG: File exists, first 80 lines:"
          head -80 scripts/generate_opcode_metadata.py
          echo "GARALT_DBG: File checksum:"
          md5sum scripts/generate_opcode_metadata.py 2>/dev/null || sha256sum scripts/generate_opcode_metadata.py
        else
          echo "GARALT_DBG: scripts/generate_opcode_metadata.py NOT FOUND"
          echo "GARALT_DBG: Listing scripts/ directory:"
          ls -la scripts/ 2>/dev/null || echo "(scripts/ dir missing)"
        fi
        echo "GARALT_DBG: --- End inspection ---"
      continue-on-error: true
    - name: Run generate_opcode_metadata.py
      run: |
        python scripts/generate_opcode_metadata.py
        if [ -n "$(git status --porcelain)" ]; then
          git add -u
          git commit -m "Auto-generate: generate_opcode_metadata.py"
          echo "- \`python scripts/generate_opcode_metadata.py\`" >> /tmp/committed_commands.txt
        fi
    - name: Check for changes
      id: check-changes
      run: |
        if [ "$(git rev-parse HEAD)" != "${{ github.event.pull_request.head.sha }}" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    - name: Read committed commands
      id: committed-commands
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "list<<EOF" >> $GITHUB_OUTPUT
        cat /tmp/committed_commands.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
    - release
